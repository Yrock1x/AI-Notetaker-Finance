name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app
      - name: Type check
        run: mypy app --ignore-missing-imports
      - name: Parse sanity
        run: python -c "import ast, glob; [ast.parse(open(f).read(), filename=f) for f in glob.glob('app/**/*.py', recursive=True)]; print('ok')"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Test
        run: npm test
      - name: Lint
        run: ESLINT_USE_FLAT_CONFIG=false npm run lint
      - name: Build
        run: npm run build
        env:
          # Placeholder values — real secrets come from Vercel at deploy. The
          # /api/inngest route fails the build without a signing key (its
          # production fail-fast), which is exactly what we want on Vercel but
          # not here; the placeholder satisfies the compile-time check only.
          NEXT_PUBLIC_API_URL: https://worker.example.com
          INNGEST_SIGNING_KEY: signkey-test-ci-placeholder
