# Fly.io deployment config for the CogniSuite worker.
#
# Bootstrap:
#     cd backend
#     fly launch --no-deploy --copy-config --name cognisuite-worker --region iad
#     fly secrets set SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=...  # etc.
#     fly deploy
#
# Scale with:
#     fly scale count 2           # horizontal
#     fly scale vm shared-cpu-1x  # size
#
# All runtime secrets come from `fly secrets`. Do NOT put secret values
# here — this file is committed.

app = "cognisuite-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/v1/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
