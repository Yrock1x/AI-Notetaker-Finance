project_id = "cognisuite"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "500MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
    "http://localhost:3000/auth/callback",
]
jwt_expiry = 3600
# refresh_token_rotation_enabled + security_update_password_require_reauthentication
# were removed from this CLI version; their defaults (rotation on, reauth on) match
# what we want.

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# OAuth providers — you set client id/secret via `supabase secrets` or the
# Supabase dashboard; this file only toggles them on.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"

[auth.external.azure]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_AZURE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_AZURE_SECRET)"
url = "https://login.microsoftonline.com/common/v2.0"
